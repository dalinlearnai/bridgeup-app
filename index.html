<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BridgeUp</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3"></script>

<style>
body {
  background: #f2f4f8;
}
</style>
</head>

<body>
<div id="app" class="max-w-md mx-auto min-h-screen bg-white">

  <!-- Header -->
  <div class="bg-gradient-to-r from-green-400 to-blue-500 text-white p-5 rounded-b-3xl shadow">
    <div class="text-2xl font-bold">BridgeUp</div>
    <div class="mt-3 bg-white text-black rounded-xl p-3 flex justify-between items-center">
      <div class="text-lg">積分</div>
      <div class="text-2xl font-bold text-green-500">{{ points }}</div>
    </div>
  </div>

  <!-- 主功能卡 -->
  <div class="grid grid-cols-2 gap-4 p-4 -mt-6">

    <div class="bg-white p-5 rounded-2xl shadow text-center">
      <div class="text-4xl mb-2">📅</div>
      <div class="text-xl font-bold">報名活動</div>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow text-center">
      <div class="text-4xl mb-2">🎁</div>
      <div class="text-xl font-bold">換領禮品</div>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow text-center">
      <div class="text-4xl mb-2">📝</div>
      <div class="text-xl font-bold">記帳</div>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow text-center">
      <div class="text-4xl mb-2">⭐</div>
      <div class="text-xl font-bold">積分紀錄</div>
    </div>

  </div>

  <!-- 活動列表 -->
  <div class="p-4 space-y-4">

    <div class="text-xl font-bold">推薦活動</div>

    <div v-for="event in events"
      class="bg-white rounded-2xl shadow p-4">

      <div class="text-lg font-bold">{{ event.name }}</div>
      <div class="text-gray-500 text-base">{{ event.time }}</div>

      <div class="flex justify-between mt-3 items-center">
        <div class="text-green-500 text-lg font-bold">
          {{ event.price }}
        </div>

        <button @click="openModal(event)"
          class="bg-green-500 text-white px-5 py-2 rounded-xl text-lg">
          報名
        </button>
      </div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white shadow flex justify-around p-3 text-sm">

    <div class="text-green-500 text-center">
      <div class="text-xl">🏠</div>
      首頁
    </div>

    <div class="text-gray-400 text-center">
      <div class="text-xl">📅</div>
      活動
    </div>

    <div class="text-gray-400 text-center">
      <div class="text-xl">👤</div>
      我的
    </div>

  </div>

  <!-- Modal -->
  <div v-if="showModal"
    class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">

    <div class="bg-white rounded-2xl p-5 w-11/12">

      <div class="text-xl font-bold mb-3">
        確認報名？
      </div>

      <div class="mb-3 text-lg">
        {{ selectedEvent.name }}
      </div>

      <div class="flex gap-3 mt-4">
        <button @click="showModal=false"
          class="flex-1 bg-gray-300 p-3 rounded-xl text-lg">
          取消
        </button>

        <button @click="confirmJoin"
          class="flex-1 bg-green-500 text-white p-3 rounded-xl text-lg">
          確認
        </button>
      </div>

    </div>
  </div>

</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      points: 120,
      showModal: false,
      selectedEvent: {},
      events: [
        {
          name: "太極小班（3人）",
          time: "星期三 10:00",
          price: "$100"
        },
        {
          name: "手機教學（一對一）",
          time: "星期五 14:00",
          price: "$150"
        }
      ]
    }
  },
  methods: {
    openModal(event) {
      this.selectedEvent = event;
      this.showModal = true;
    },
    confirmJoin() {
      this.points += 10;
      this.showModal = false;
      alert("報名成功！");
    }
  }
}).mount('#app');
</script>

</body>
</html>
